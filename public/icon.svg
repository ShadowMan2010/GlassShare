<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14112e"/>
      <stop offset="100%" stop-color="#05040a"/>
    </radialGradient>
    
    <!-- Neon Purple Glow -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Neon Cyan Glow -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glass Overlay Shadow -->
    <filter id="glassShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Glow Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#purpleGrad)" stroke-width="4" opacity="0.3" filter="url(#neonGlow)"/>
  
  <!-- Core Abstract Polyhedron (Glassmorphic Hexagon Nodes) -->
  <g filter="url(#glassShadow)">
    <!-- Cyan Triangle base -->
    <polygon points="256,120 370,320 142,320" fill="none" stroke="url(#cyanGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#neonGlow)"/>
    
    <!-- Purple Intersecting Triangle -->
    <polygon points="256,392 370,192 142,192" fill="none" stroke="url(#purpleGrad)" stroke-width="8" stroke-linejoin="round" opacity="0.8" filter="url(#neonGlow)"/>
    
    <!-- Connecting network lines -->
    <line x1="256" y1="120" x2="256" y2="392" stroke="#ffffff" stroke-width="3" stroke-dasharray="6,6" opacity="0.5" />
    <line x1="142" y1="192" x2="370" y2="320" stroke="#ffffff" stroke-width="3" stroke-dasharray="6,6" opacity="0.5" />
    <line x1="370" y1="192" x2="142" y2="320" stroke="#ffffff" stroke-width="3" stroke-dasharray="6,6" opacity="0.5" />

    <!-- Central core glowing node -->
    <circle cx="256" cy="256" r="32" fill="url(#cyanGrad)" filter="url(#neonGlow)"/>
    <circle cx="256" cy="256" r="12" fill="#ffffff"/>
    
    <!-- Corner Nodes -->
    <circle cx="256" cy="120" r="14" fill="#ffffff" filter="url(#neonGlow)"/>
    <circle cx="370" y1="192" cy="192" r="10" fill="url(#purpleGrad)"/>
    <circle cx="142" y1="192" cy="192" r="10" fill="url(#purpleGrad)"/>
    <circle cx="370" y1="320" cy="320" r="10" fill="url(#cyanGrad)"/>
    <circle cx="142" y1="320" cy="320" r="10" fill="url(#cyanGrad)"/>
    <circle cx="256" cy="392" r="14" fill="#ffffff" filter="url(#neonGlow)"/>
  </g>
</svg>
